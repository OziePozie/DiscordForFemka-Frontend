name: Build and Deploy Frontend

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE_FRONTEND: ghcr.io/oziepozie/discordforfemka-frontend

jobs:
  # ──────────────────────────────────────────────────────────
  # Frontend image: multi-stage Node→nginx:alpine, push to ghcr.io.
  # ──────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,format=short
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ──────────────────────────────────────────────────────────
  # Deploy frontend ONLY — pull frontend image + restart frontend container.
  # docker-compose.yml живёт в монорепо (backend) на сервере; здесь только
  # тянем свежий образ и перезапускаем контейнер frontend.
  # ──────────────────────────────────────────────────────────
  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: /tmp/deploy_key
          script: |
            set -e
            cd /opt/femka/DiscordForFemka
            docker compose pull frontend
            docker compose up -d frontend
            docker image prune -f
            docker logs --tail 20 discord-femka-frontend
