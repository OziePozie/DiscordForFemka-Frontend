# SPA + reverse-proxy to the backend container.
# Backend hostname `app` resolves via Docker DNS within the compose network.

# HTTP: только ACME-challenge для Let's Encrypt + редирект всего остального на HTTPS.
server {
  listen 80 default_server;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS: основная отдача SPA + reverse-proxy.
server {
  listen 443 ssl default_server;
  http2 on;
  server_name playstage.online;

  ssl_certificate     /etc/letsencrypt/live/playstage.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/playstage.online/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1h;
  add_header Strict-Transport-Security "max-age=31536000" always;

  root /usr/share/nginx/html;
  index index.html;

  # Reasonable caching: hashed assets get 1 year, html никогда не кешируем.
  location ~* \.(?:js|css|woff2?|png|jpe?g|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # Reverse-proxy: REST API + OAuth callbacks → Spring Boot.
  # ВАЖНО: проксируем на КОНКРЕТНЫЙ контейнер `discord-femka`, а не на `app`.
  # Close-бот (/opt/femka/close-bot) поднят из того же compose с `service: app`,
  # поэтому Docker вешает алиас `app` и на него тоже — `app` начинает round-robin
  # между главным бэкендом и close-ботом (старый образ), и ~50% /api,/oauth,/close
  # запросов уходят не туда (для swagger это выглядело как случайные 404).
  # container_name `discord-femka` — уникальный алиас, всегда главный бэкенд.
  #
  # ^~ обязательно: без него regex location для .js/.css выше перехватывает
  # ассеты Swagger UI (/api/webjars/swagger-ui/*.js, *.css) и возвращает 404,
  # из-за чего /api/swagger-ui.html не рендерится. Как и у /close/ ниже.
  location ^~ /api/ {
    # Matches spring.servlet.multipart.max-file-size=10MB so attachment
    # uploads (banners, avatars, etc.) aren't truncated by the nginx default of 1MB.
    client_max_body_size 10M;
    proxy_pass http://discord-femka:8085;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
  location /oauth/ {
    proxy_pass http://discord-femka:8085;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ^~ обязательно: без него regex location для .png выше перехватит
  # запрос /close/lobby-image/*.png и вернёт 404 — Discord не отрендерит embed.
  location ^~ /close/ {
    proxy_pass http://discord-femka:8085;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Dozzle — лёгкий веб-просмотрщик docker-логов (контейнер `dozzle:8080`,
  # DOZZLE_BASE=/logs). Наружу порт не публикуется, ходим только отсюда.
  # ^~ обязательно: иначе regex-location статики выше перехватит /logs/assets/*.js
  # и *.css и вернёт 404. proxy_http_version 1.1 + Upgrade/Connection — Dozzle
  # стримит логи по websocket, без них стрим не поднимется.
  location ^~ /logs/ {
    proxy_pass http://dozzle:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # SPA fallback — все клиентские роуты отдают index.html.
  location / {
    try_files $uri /index.html;
  }
}
