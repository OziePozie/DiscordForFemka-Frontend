# SPA + reverse-proxy to the backend container.
# Backend hostname `app` resolves via Docker DNS within the compose network.
server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reasonable caching: hashed assets get 1 year, html никогда не кешируем.
  location ~* \.(?:js|css|woff2?|png|jpe?g|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # Reverse-proxy: REST API + OAuth callbacks → Spring Boot.
  location /api/ {
    proxy_pass http://app:8085;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
  location /oauth/ {
    proxy_pass http://app:8085;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — все клиентские роуты отдают index.html.
  location / {
    try_files $uri /index.html;
  }
}
