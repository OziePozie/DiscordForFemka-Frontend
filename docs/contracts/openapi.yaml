openapi: 3.1.0
info:
  title: Femka Tournament Platform API
  version: 1.0.0
  description: |
    REST API для турнирной платформы.
    Полные текстовые контракты — см. соседние файлы 03-rest-api.md, 04-dto.md, 06-auth-flow.md.
servers:
  - url: http://localhost:8080
    description: local dev
  - url: https://femka.example
    description: production

tags:
  - { name: Auth,           description: "Steam OpenID, session, account links" }
  - { name: Player,         description: "Профиль текущего игрока + публичные профили" }
  - { name: MMR,            description: "MMR + заявки на изменение" }
  - { name: Attachment,     description: "Загрузка файлов" }
  - { name: Team,           description: "Команды и приглашения" }
  - { name: Season,         description: "Сезоны" }
  - { name: Tournament,     description: "Турниры" }
  - { name: Match,          description: "Матчи и открытые лобби (КВ/шоу-матчи)" }
  - { name: Admin,          description: "Админ-панель: модерация, аудит" }
  - { name: Notification,   description: "Уведомления игрока (колокольчик, SSE)" }

security:
  - cookieAuth: []

paths:
  # =================== AUTH ===================
  /api/v1/auth/session:
    get:
      tags: [Auth]
      summary: Текущая сессия (или null)
      security: []
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SessionDto"
                  - type: "null"
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        "204": { description: ок }

  /api/v1/me/links/{provider}:
    delete:
      tags: [Auth]
      summary: Отвязать провайдер
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string, enum: [discord, twitch] }
      responses:
        "204": { description: ок }
        "404": { $ref: "#/components/responses/NotFound" }

  # =================== PLAYER ===================
  /api/v1/me:
    get:
      tags: [Player]
      summary: Текущий игрок (полный профиль)
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeDto" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    patch:
      tags: [Player]
      summary: Редактирование профиля
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeDto" }
        "400": { $ref: "#/components/responses/Validation" }

  /api/v1/me/avatar:
    post:
      tags: [Player]
      summary: Загрузить аватар
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
              required: [file]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttachmentDto" }
        "400": { $ref: "#/components/responses/Validation" }

  /api/v1/players:
    get:
      tags: [Player]
      summary: Поиск/листинг игроков
      security: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: country
          schema: { type: string }
        - in: query
          name: role
          schema: { $ref: "#/components/schemas/PlayerPosition" }
        - in: query
          name: activity
          schema: { type: string, enum: [active, inactive, all], default: all }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/PlayerPublicDto" }

  /api/v1/players/{id}:
    get:
      tags: [Player]
      summary: Публичный профиль
      security: []
      parameters:
        - $ref: "#/components/parameters/IdInPath"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlayerPublicDto" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/players/{id}/history:
    get:
      tags: [Player]
      summary: Полная "карьерная" история игрока (Этап 9, архив)
      description: |
        Турниры (отсортированы по startsAt DESC), команды (включая прошлые) и
        таймлайн MMR (V0 — только текущая запись; полная история — в бэклоге).
      security: []
      parameters:
        - $ref: "#/components/parameters/IdInPath"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlayerHistoryDto" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/players/{id}/matches:
    get:
      tags: [Player]
      summary: Сыгранные матчи игрока (пагинация, новые сверху)
      description: |
        Список матчей с записанной пост-игровой статистикой: результат (победа/поражение),
        герой, KDA, турнир и дата. Строится из MatchPlayerStat + Match.
      security: []
      parameters:
        - $ref: "#/components/parameters/IdInPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/PlayerMatchSummaryDto" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/players/{id}/stats:
    get:
      tags: [Player]
      summary: Сводная статистика игрока
      description: |
        Винрейт, любимые герои (топ по числу игр), число турниров, средний KDA,
        текущий и лучший стрик. Считается на лету из MatchPlayerStat + Match.
      security: []
      parameters:
        - $ref: "#/components/parameters/IdInPath"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlayerStatsDto" }
        "404": { $ref: "#/components/responses/NotFound" }

  # =================== Internal rating ===================
  /api/v1/ratings/leaderboard:
    get:
      tags: [Rating]
      summary: Таблица лидеров по внутреннему рейтингу платформы
      description: |
        Игроки, отсортированные по внутреннему рейтингу (по убыванию). Рейтинг
        отдельный от импортированного Dota MMR.
      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/LeaderboardEntryDto" }

  /api/v1/ratings/players/{id}:
    get:
      tags: [Rating]
      summary: Внутренний рейтинг игрока
      description: |
        Текущий внутренний рейтинг игрока. Для игрока без сыгранных матчей
        возвращается синтетическая запись со стартовым рейтингом (ранг Blossom).
      security: []
      parameters:
        - $ref: "#/components/parameters/IdInPath"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlayerRatingDto" }

  /api/v1/admin/ratings/recalculate:
    post:
      tags: [Rating]
      summary: Пересчитать внутренний рейтинг по необработанным завершённым матчам
      description: |
        Идемпотентно применяет рейтинговые дельты для всех завершённых матчей,
        ещё не обработанных. Безопасно вызывать повторно.
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                type: object
                properties:
                  appliedMatches: { type: integer, format: int32 }

  # =================== MMR ===================
  /api/v1/me/mmr:
    get:
      tags: [MMR]
      summary: Мой MMR + история заявок
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MyMmrDto" }

  /api/v1/me/mmr/refresh:
    post:
      tags: [MMR]
      summary: Принудительно дёрнуть OpenDota
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlayerMmrDto" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/me/mmr/requests:
    get:
      tags: [MMR]
      summary: Мои заявки
      parameters:
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/RequestStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/MmrChangeRequestDto" }
    post:
      tags: [MMR]
      summary: Создать заявку
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMmrChangeRequest" }
      responses:
        "201":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MmrChangeRequestDto" }
        "400": { $ref: "#/components/responses/Validation" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/admin/players:
    get:
      tags: [Admin, Player]
      summary: Админский поиск игроков.
      parameters:
        - in: query
          name: q
          required: false
          description: Substring on nickname (case-insensitive).
          schema: { type: string }
        - in: query
          name: banned
          required: false
          schema: { type: boolean }
        - in: query
          name: activity
          required: false
          schema:
            type: string
            enum: [active, inactive, all]
        - in: query
          name: role
          required: false
          schema: { $ref: "#/components/schemas/PlayerRole" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - in: query
          name: sort
          required: false
          description: "field[,asc|desc]; default createdAt,desc"
          schema: { type: string }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/PlayerAdminDto" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/admin/players/{id}:
    patch:
      tags: [Admin, Player]
      summary: Редактирование полей игрока (роли, бан, override MMR).
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminUpdatePlayerRequest" }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlayerAdminDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/admin/players/{id}/ban:
    post:
      tags: [Admin, Player]
      summary: Забанить игрока.
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlayerAdminDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/admin/players/{id}/unban:
    post:
      tags: [Admin, Player]
      summary: Снять бан с игрока.
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlayerAdminDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/admin/players/{id}/female-verification:
    post:
      tags: [Admin, Player]
      summary: Выдать/снять официальный статус «верифицирована» (MODERATOR/ADMIN).
      description: |
        verified=true проставляет femaleVerifiedAt/By; verified=false очищает их.
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verified]
              properties:
                verified: { type: boolean }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlayerAdminDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/admin/mmr/requests:
    get:
      tags: [Admin, MMR]
      summary: Очередь модерации
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, all]
            default: pending
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/MmrChangeRequestAdminDto" }

  /api/v1/admin/mmr/requests/{id}/approve:
    post:
      tags: [Admin, MMR]
      summary: Одобрить заявку
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { comment: { type: string } }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MmrChangeRequestAdminDto" }

  /api/v1/admin/mmr/requests/{id}/reject:
    post:
      tags: [Admin, MMR]
      summary: Отклонить заявку
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties: { comment: { type: string } }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MmrChangeRequestAdminDto" }

  # =================== ATTACHMENT ===================
  /api/v1/attachments:
    post:
      tags: [Attachment]
      summary: Загрузить файл
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, kind]
              properties:
                file: { type: string, format: binary }
                kind: { $ref: "#/components/schemas/AttachmentKind" }
      responses:
        "201":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttachmentDto" }
        "400": { $ref: "#/components/responses/Validation" }

  /api/v1/attachments/{id}:
    get:
      tags: [Attachment]
      summary: Скачать файл
      security: []
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: бинарный поток
          content:
            "*/*":
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Attachment]
      summary: Удалить файл
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "204": { description: ок }

  # =================== TEAM ===================
  /api/v1/teams:
    get:
      tags: [Team]
      summary: Листинг команд
      security: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/TeamStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TeamPublicDto" }
    post:
      tags: [Team]
      summary: Создать команду
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTeamRequest" }
      responses:
        "201":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamDto" }
        "400": { $ref: "#/components/responses/Validation" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/teams/{id}:
    get:
      tags: [Team]
      security: []
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamDto" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Team]
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTeamRequest" }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamDto" }

  /api/v1/teams/{id}/history:
    get:
      tags: [Team]
      summary: История турниров команды (Этап 9, архив)
      security: []
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamHistoryDto" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/teams/{id}/disband:
    post:
      tags: [Team]
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamDto" }

  /api/v1/teams/{id}/captain:
    post:
      tags: [Team]
      summary: Передать капитанство
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newCaptainPlayerId]
              properties:
                newCaptainPlayerId: { type: string, format: uuid }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamDto" }

  /api/v1/teams/{id}/invites:
    get:
      tags: [Team]
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TeamInviteDto" }
    post:
      tags: [Team]
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInviteRequest" }
      responses:
        "201":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamInviteDto" }

  /api/v1/me/invites:
    get:
      tags: [Team]
      summary: Мои входящие инвайты
      parameters:
        - in: query
          name: status
          description: Filter by invite status. ALL or omitted returns every status.
          required: false
          schema:
            type: string
            enum: [PENDING, ACCEPTED, DECLINED, CANCELLED, EXPIRED, ALL]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TeamInviteDto" }

  /api/v1/me/invites/{id}/accept:
    post:
      tags: [Team]
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamDto" }

  /api/v1/me/invites/{id}/decline:
    post:
      tags: [Team]
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "204": { description: ок }

  # =================== SEASON ===================
  /api/v1/seasons:
    get:
      tags: [Season]
      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/SeasonDto" }

  /api/v1/seasons/current:
    get:
      tags: [Season]
      security: []
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                oneOf:
