      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/NotificationDto" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /api/v1/notifications/unread-count:
    get:
      tags: [Notification]
      summary: Количество непрочитанных уведомлений
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer, format: int64 }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /api/v1/notifications/{id}/read:
    post:
      tags: [Notification]
      summary: Отметить уведомление прочитанным
      parameters:
        - $ref: "#/components/parameters/IdInPath"
      responses:
        "204": { description: отмечено }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/notifications/read-all:
    post:
      tags: [Notification]
      summary: Отметить все уведомления прочитанными
      responses:
        "204": { description: отмечено }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /api/v1/notifications/stream:
    get:
      tags: [Notification]
      summary: Поток уведомлений (SSE)
      description: >-
        Server-Sent Events. Каждое событие notification несёт в data JSON одного NotificationDto.
      responses:
        "200":
          description: поток
          content:
            text/event-stream:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: PLATFORM_SESSION

  parameters:
    IdInPath:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    Page:
      in: query
      name: page
      schema: { type: integer, default: 0, minimum: 0 }
    Size:
      in: query
      name: size
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    Sort:
      in: query
      name: sort
      schema: { type: string, example: createdAt,desc }
    BotUsername:
      in: path
      name: username
      required: true
      schema: { type: string }

  responses:
    Unauthenticated:
      description: 401
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/ErrorDto" } } }
    Forbidden:
      description: 403
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/ErrorDto" } } }
    NotFound:
      description: 404
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/ErrorDto" } } }
    Validation:
      description: 400
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/ErrorDto" } } }
    Conflict:
      description: 409
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/ErrorDto" } } }
    RateLimited:
      description: 429
      content: { application/problem+json: { schema: { $ref: "#/components/schemas/ErrorDto" } } }

  schemas:
    # ---- Common ----
    ErrorDto:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        code: { type: string }
        instance: { type: string }
        errors:
          type: array
          items: { $ref: "#/components/schemas/FieldError" }
    FieldError:
      type: object
      properties:
        field: { type: string }
        message: { type: string }
        code: { type: string }
    Page:
      type: object
      properties:
        items: { type: array, items: {} }
        page: { type: integer }
        size: { type: integer }
        totalItems: { type: integer, format: int64 }
        totalPages: { type: integer }

    # ---- Enums ----
    PlayerRole:        { type: string, enum: [PLAYER, CAPTAIN, MODERATOR, ADMIN] }
    PlayerPosition:    { type: string, enum: [POS_1, POS_2, POS_3, POS_4, POS_5] }
    MmrSource:         { type: string, enum: [AUTO_ESTIMATE, MANUAL_CONFIRMED, LEADERBOARD] }
    MmrChangeReason:   { type: string, enum: [CALIBRATION, ROLE_CHANGE, INACTIVE_RETURN, OTHER] }
    RequestStatus:     { type: string, enum: [PENDING, APPROVED, REJECTED] }
    ActivityStatus:    { type: string, enum: [ACTIVE, INACTIVE] }
    InactiveReason:
      type: string
      enum: [MMR_STALE, MISSING_FIELDS, UNCONFIRMED_5600_PLUS, BANNED, NEVER_FETCHED,
             INCOMPLETE_ROSTER, INACTIVE_PLAYERS, UNCONFIRMED_CAPTAIN, DISBANDED]
    AttachmentKind:    { type: string, enum: [MMR_SCREENSHOT, TEAM_LOGO, PLAYER_AVATAR, TOURNAMENT_BANNER, SEASON_BANNER] }
    TeamMemberRole:    { type: string, enum: [CAPTAIN, MAIN, SUB] }
    TeamStatus:        { type: string, enum: [ACTIVE, INACTIVE, DISBANDED] }
    InviteStatus:      { type: string, enum: [PENDING, ACCEPTED, DECLINED, CANCELLED, EXPIRED] }
    SeasonStatus:      { type: string, enum: [PLANNED, ACTIVE, FINISHED] }
    TournamentFormat:  { type: string, enum: [SINGLE_ELIM, DOUBLE_ELIM, ROUND_ROBIN, SWISS, SHOWMATCH] }
    TournamentStatus:  { type: string, enum: [ANNOUNCED, REGISTRATION_OPEN, REGISTRATION_CLOSED, LIVE, FINISHED, CANCELLED] }
    MatchKind:         { type: string, enum: [TOURNAMENT, CLAN_WAR, SHOWMATCH] }
    MatchFormat:       { type: string, enum: [BO1, BO3, BO5] }
    MatchResultType:   { type: string, enum: [NORMAL, TECH_WIN, TECH_LOSS, CANCELLED] }
    BracketSection:    { type: string, enum: [WB, LB, GF] }
    MatchStatus:       { type: string, enum: [SCHEDULED, LIVE, FINISHED, CANCELLED] }
    MatchRequestStatus: { type: string, enum: [OPEN, MATCHED, CANCELLED, EXPIRED] }
    OpenLobbyMode:     { type: string, enum: [SIMPLIFIED, WITH_ROLES] }
    OpenLobbyStatus:   { type: string, enum: [OPEN, READY, LAUNCHED, IN_PROGRESS, CANCELLED, EXPIRED] }
    AccountProvider:   { type: string, enum: [DISCORD, TWITCH] }
    GameMode:
      type: string
      enum: [ALL_PICK, CAPTAINS_MODE, CAPTAINS_DRAFT, RANKED_AP, SINGLE_DRAFT,
             RANDOM_DRAFT, ALL_RANDOM, TURBO, ALL_PICK_RANKED]
    Region:
      type: string
      enum: [AUTO, EUROPE, US_EAST, US_WEST, SE_ASIA, RUSSIA, AUSTRALIA,
             SOUTH_AMERICA, STOCKHOLM, DUBAI, AUSTRIA, PERU, SOUTH_AFRICA,
             CHILE, INDIA]

    # ---- Auth ----
    SessionDto:
      type: object
      required: [playerId, steamId, roles, activity, profileIncomplete]
      properties:
        playerId:          { type: string, format: uuid }
        steamId:           { type: string, format: int64, pattern: '^[0-9]+$' }
        nickname:          { type: string, nullable: true }
        avatarUrl:         { type: string, nullable: true }
        roles:             { type: array, items: { $ref: "#/components/schemas/PlayerRole" } }
        activity:          { $ref: "#/components/schemas/ActivityStatus" }
        profileIncomplete: { type: boolean }

    # ---- Attachment ----
    AttachmentDto:
      type: object
      required: [id, kind, filename, contentType, sizeBytes, url, createdAt]
      properties:
        id:          { type: string, format: uuid }
        kind:        { $ref: "#/components/schemas/AttachmentKind" }
        filename:    { type: string }
        contentType: { type: string }
        sizeBytes:   { type: integer, format: int64 }
        url:         { type: string }
        createdAt:   { type: string, format: date-time }

    # ---- Player ----
    PlayerMmrPublicDto:
      type: object
      required: [mmr, source]
      properties:
        mmr:              { type: integer }
        source:           { $ref: "#/components/schemas/MmrSource" }
        rankTier:         { type: integer, nullable: true }
        leaderboardRank:  { type: integer, nullable: true }
        fetchedAt:        { type: string, format: date-time, nullable: true }
    PlayerPublicDto:
      type: object
      required: [id, activity]
      properties:
        id:              { type: string, format: uuid }
        nickname:        { type: string, nullable: true }
        avatarUrl:       { type: string, nullable: true }
        country:         { type: string, nullable: true }
        gender:          { allOf: [{ $ref: "#/components/schemas/GenderType" }], nullable: true }
        femaleVerified:  { type: boolean, description: "Official 'verified female' status granted by an admin." }
        primaryRole:     { allOf: [{ $ref: "#/components/schemas/PlayerPosition" }], nullable: true }
        secondaryRoles:  { type: array, items: { $ref: "#/components/schemas/PlayerPosition" } }
        mmr:             { allOf: [{ $ref: "#/components/schemas/PlayerMmrPublicDto" }], nullable: true }
        activity:        { $ref: "#/components/schemas/ActivityStatus" }
        discordId:       { type: string, format: int64, pattern: '^[0-9]+$', nullable: true }
        twitchLogin:     { type: string, nullable: true }
        dotabuffUrl:     { type: string, nullable: true }
        stratzUrl:       { type: string, nullable: true }
        teams:           { type: array, items: { $ref: "#/components/schemas/TeamMembershipDto" } }
        createdAt:       { type: string, format: date-time }
        nicknameHistory: { type: array, items: { $ref: "#/components/schemas/NicknameHistoryEntryDto" } }
    NicknameHistoryEntryDto:
      type: object
      description: One past nickname and the time it was replaced.
      required: [changedAt]
      properties:
        nickname:        { type: string, nullable: true }
        changedAt:       { type: string, format: date-time }
    RankTier:
      type: string
      description: Внутренний ранг по порогам рейтинга.
      enum: [BLOSSOM, SAPPHIRE, DIAMOND, IMMORTAL, CELESTIAL]
    PlayerRatingDto:
      type: object
      required: [playerId, rating, gamesPlayed, wins, losses, currentStreak, rankTier, rankName]
      properties:
        playerId:       { type: string, format: uuid }
        rating:         { type: integer, format: int32 }
        gamesPlayed:    { type: integer, format: int32 }
        wins:           { type: integer, format: int32 }
        losses:         { type: integer, format: int32 }
        currentStreak:  { type: integer, format: int32 }
        rankTier:       { $ref: "#/components/schemas/RankTier" }
        rankName:       { type: string }
        updatedAt:      { type: string, format: date-time, nullable: true }
    LeaderboardEntryDto:
      type: object
      required: [rank, playerId, rating, gamesPlayed, wins, losses, currentStreak, rankTier, rankName]
      properties:
        rank:           { type: integer, format: int32 }
        playerId:       { type: string, format: uuid }
        nickname:       { type: string, nullable: true }
        avatarUrl:      { type: string, nullable: true }
        country:        { type: string, nullable: true }
        rating:         { type: integer, format: int32 }
        gamesPlayed:    { type: integer, format: int32 }
        wins:           { type: integer, format: int32 }
        losses:         { type: integer, format: int32 }
        currentStreak:  { type: integer, format: int32 }
        rankTier:       { $ref: "#/components/schemas/RankTier" }
        rankName:       { type: string }
    GenderType:
      type: string
      enum: [MALE, FEMALE]
    PlayerMmrDto:
      type: object
      required: [mmr, source, fetchedAt]
      properties:
        mmr:             { type: integer }
        source:          { $ref: "#/components/schemas/MmrSource" }
        rankTier:        { type: integer, nullable: true }
        leaderboardRank: { type: integer, nullable: true }
        fetchedAt:       { type: string, format: date-time }
        confirmedAt:     { type: string, format: date-time, nullable: true }
    PlayerActivityDto:
      type: object
      required: [status, reasons, lastCheckAt]
      properties:
        status:       { $ref: "#/components/schemas/ActivityStatus" }
        reasons:      { type: array, items: { $ref: "#/components/schemas/InactiveReason" } }
        lastCheckAt:  { type: string, format: date-time }
    AccountLinkDto:
      type: object
      required: [provider, externalId, linkedAt]
      properties:
        provider:       { $ref: "#/components/schemas/AccountProvider" }
        externalId:     { type: string }
        externalLogin:  { type: string, nullable: true }
        linkedAt:       { type: string, format: date-time }
    TeamMembershipDto:
      type: object
      required: [teamId, name, tag, role, teamStatus]
      properties:
        teamId:     { type: string, format: uuid }
        name:       { type: string }
        tag:        { type: string }
        role:       { $ref: "#/components/schemas/TeamMemberRole" }
        teamStatus: { $ref: "#/components/schemas/TeamStatus" }
    MeDto:
      type: object
      required: [profile, steamId, links, teams, roles]
      properties:
        profile:  { $ref: "#/components/schemas/PlayerPublicDto" }
        steamId:  { type: string, format: int64, pattern: '^[0-9]+$' }
        mmr:      { allOf: [{ $ref: "#/components/schemas/PlayerMmrDto" }], nullable: true }
        activity: { allOf: [{ $ref: "#/components/schemas/PlayerActivityDto" }], nullable: true }
        links:    { type: array, items: { $ref: "#/components/schemas/AccountLinkDto" } }
        teams:    { type: array, items: { $ref: "#/components/schemas/TeamMembershipDto" } }
        roles:    { type: array, items: { $ref: "#/components/schemas/PlayerRole" } }
    UpdateMeRequest:
      type: object
      properties:
        nickname:       { type: string, maxLength: 64 }
        country:        { type: string, maxLength: 2 }
        gender:         { $ref: "#/components/schemas/GenderType" }
        primaryRole:    { $ref: "#/components/schemas/PlayerPosition" }
        secondaryRoles: { type: array, items: { $ref: "#/components/schemas/PlayerPosition" } }
        dotabuffUrl:    { type: string }
        stratzUrl:      { type: string }
    PlayerAdminDto:
      type: object
      required: [profile, steamId, banned, roles, mmr, activity]
      properties:
        profile:     { $ref: "#/components/schemas/PlayerPublicDto" }
        steamId:     { type: string, format: int64, pattern: '^[0-9]+$' }
        discordId:   { type: string, format: int64, pattern: '^[0-9]+$', nullable: true }
        twitchLogin: { type: string, nullable: true }
        banned:      { type: boolean }
        banReason:   { type: string, nullable: true }
        roles:       { type: array, items: { $ref: "#/components/schemas/PlayerRole" } }
        mmr:         { $ref: "#/components/schemas/PlayerMmrDto" }
        activity:    { $ref: "#/components/schemas/PlayerActivityDto" }
    AdminUpdatePlayerRequest:
      type: object
      properties:
        roles:             { type: array, items: { $ref: "#/components/schemas/PlayerRole" } }
        banned:            { type: boolean }
        banReason:         { type: string }
        overrideMmr:       { type: integer }
        overrideMmrReason: { type: string }

    # ---- MMR ----
    MyMmrDto:
      type: object
      required: [current, recentRequests]
      properties:
        current:        { $ref: "#/components/schemas/PlayerMmrDto" }
        recentRequests: { type: array, items: { $ref: "#/components/schemas/MmrChangeRequestDto" } }
    CreateMmrChangeRequest:
      type: object
      required: [requestedMmr, reason, screenshotId]
      properties:
        requestedMmr: { type: integer, minimum: 0, maximum: 15000 }
        reason:       { $ref: "#/components/schemas/MmrChangeReason" }
        screenshotId: { type: string, format: uuid }
        comment:      { type: string, maxLength: 1000 }
    MmrChangeRequestDto:
      type: object
      required: [id, requestedMmr, reason, screenshotId, screenshotUrl, status, createdAt]
      properties:
        id:             { type: string, format: uuid }
        requestedMmr:   { type: integer }
        reason:         { $ref: "#/components/schemas/MmrChangeReason" }
        screenshotId:   { type: string, format: uuid }
        screenshotUrl:  { type: string }
        comment:        { type: string, nullable: true }
        status:         { $ref: "#/components/schemas/RequestStatus" }
        reviewComment:  { type: string, nullable: true }
        decidedAt:      { type: string, format: date-time, nullable: true }
        createdAt:      { type: string, format: date-time }
    MmrChangeRequestAdminDto:
      type: object
      required: [id, player, requestedMmr, currentMmr, reason, screenshotId, screenshotUrl, status, createdAt]
      properties:
        id:            { type: string, format: uuid }
        player:        { $ref: "#/components/schemas/PlayerPublicDto" }
        requestedMmr:  { type: integer }
        currentMmr:    { type: integer }
        reason:        { $ref: "#/components/schemas/MmrChangeReason" }
        screenshotId:  { type: string, format: uuid }
        screenshotUrl: { type: string }
        comment:       { type: string, nullable: true }
        status:        { $ref: "#/components/schemas/RequestStatus" }
        reviewerId:    { type: string, format: uuid, nullable: true }
        reviewComment: { type: string, nullable: true }
        decidedAt:     { type: string, format: date-time, nullable: true }
        createdAt:     { type: string, format: date-time }

    # ---- Team ----
    TeamPublicDto:
      type: object
      required: [id, name, tag, captain, status, hidden, memberCount, createdAt]
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        tag:          { type: string }
        logoUrl:      { type: string, nullable: true }
        captain:      { $ref: "#/components/schemas/PlayerPublicDto" }
        avgMmr:       { type: integer, nullable: true }
        status:       { $ref: "#/components/schemas/TeamStatus" }
        hidden:
          type: boolean
          description: Скрыта ли сущность с публичной части (видна только персоналу MODERATOR/ADMIN)
          example: false
        memberCount:  { type: integer }
        createdAt:    { type: string, format: date-time }
    TeamMemberDto:
      type: object
      required: [player, role, joinedAt]
      properties:
        player:    { $ref: "#/components/schemas/PlayerPublicDto" }
        role:      { $ref: "#/components/schemas/TeamMemberRole" }
        position:  { $ref: "#/components/schemas/PlayerPosition", nullable: true }
        joinedAt:  { type: string, format: date-time }
    TeamDto:
      type: object
      required: [id, name, tag, captain, status, hidden, members, createdAt, updatedAt]
      properties:
        id:               { type: string, format: uuid }
        name:             { type: string }
        tag:              { type: string }
        logoUrl:          { type: string, nullable: true }
        captain:          { $ref: "#/components/schemas/PlayerPublicDto" }
        avgMmr:           { type: integer, nullable: true }
        status:           { $ref: "#/components/schemas/TeamStatus" }
        hidden:
          type: boolean
          description: Скрыта ли сущность с публичной части (видна только персоналу MODERATOR/ADMIN)
          example: false
        inactiveReasons:  { type: array, items: { $ref: "#/components/schemas/InactiveReason" } }
        members:          { type: array, items: { $ref: "#/components/schemas/TeamMemberDto" } }
        frozenUntil:      { type: string, format: date-time, nullable: true }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }
    CreateTeamRequest:
      type: object
      required: [name, tag]
      properties:
        name:               { type: string, maxLength: 64 }
        tag:                { type: string, minLength: 2, maxLength: 8, pattern: "^[A-Za-z0-9._-]+$" }
        logoAttachmentId:   { type: string, format: uuid }
    UpdateTeamRequest:
      type: object
      properties:
        name:             { type: string, maxLength: 64 }
        logoAttachmentId: { type: string, format: uuid }
    CreateInviteRequest:
      type: object
      required: [inviteePlayerId, proposedRole]
      properties:
        inviteePlayerId: { type: string, format: uuid }
        proposedRole:    { $ref: "#/components/schemas/TeamMemberRole" }
        position:        { $ref: "#/components/schemas/PlayerPosition" }
    TeamInviteDto:
      type: object
      required: [id, team, invitee, inviter, proposedRole, status, expiresAt, createdAt]
      properties:
        id:           { type: string, format: uuid }
        team:         { $ref: "#/components/schemas/TeamPublicDto" }
        invitee:      { $ref: "#/components/schemas/PlayerPublicDto" }
        inviter:      { $ref: "#/components/schemas/PlayerPublicDto" }
        proposedRole: { $ref: "#/components/schemas/TeamMemberRole" }
        status:       { $ref: "#/components/schemas/InviteStatus" }
        expiresAt:    { type: string, format: date-time }
        createdAt:    { type: string, format: date-time }
        decidedAt:    { type: string, format: date-time, nullable: true }

    # ---- Season ----
    SeasonDto:
      type: object
      required: [id, name, slug, status, startsAt, endsAt]
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        slug:        { type: string }
        description: { type: string, nullable: true }
        status:      { $ref: "#/components/schemas/SeasonStatus" }
        startsAt:    { type: string, format: date-time }
        endsAt:      { type: string, format: date-time }
        bannerUrl:   { type: string, nullable: true }
    HighlightDto:
      type: object
      properties:
        kind:  { type: string }
        title: { type: string }
        url:   { type: string }
    SeasonDetailsDto:
      type: object
      required: [season, tournaments, highlights]
      properties:
        season:      { $ref: "#/components/schemas/SeasonDto" }
        tournaments: { type: array, items: { $ref: "#/components/schemas/TournamentDto" } }
        highlights:  { type: array, items: { $ref: "#/components/schemas/HighlightDto" } }

    # ---- Archive (Stage 9) ----
    SeasonChampionDto:
      type: object
      required: [tournamentId, tournamentName, tournamentSlug, format]
      properties:
        tournamentId:   { type: string, format: uuid }
        tournamentName: { type: string }
        tournamentSlug: { type: string }
        format:         { $ref: "#/components/schemas/TournamentFormat" }
        endsAt:         { type: string, format: date-time, nullable: true }
        winnerTeam:     { $ref: "#/components/schemas/TeamPublicDto" }
    PlayerHistoryDto:
      type: object
      required: [tournaments, teams, mmrTimeline]
      properties:
        tournaments: { type: array, items: { $ref: "#/components/schemas/PlayerTournamentEntry" } }
        teams:       { type: array, items: { $ref: "#/components/schemas/PlayerTeamEntry" } }
        mmrTimeline: { type: array, items: { $ref: "#/components/schemas/MmrHistoryEntry" } }
    PlayerTournamentEntry:
      type: object
      required: [tournamentId, tournamentSlug, tournamentName, status, teamId, wasWinner]
      properties:
        tournamentId:   { type: string, format: uuid }
        tournamentSlug: { type: string }
        tournamentName: { type: string }
        status:         { $ref: "#/components/schemas/TournamentStatus" }
        startsAt:       { type: string, format: date-time, nullable: true }
        endsAt:         { type: string, format: date-time, nullable: true }
        teamId:         { type: string, format: uuid }
        teamName:       { type: string, nullable: true }
        teamTag:        { type: string, nullable: true }
        wasWinner:      { type: boolean }
    PlayerTeamEntry:
      type: object
      required: [teamId, teamName, teamTag, role, joinedAt]
      properties:
        teamId:   { type: string, format: uuid }
        teamName: { type: string }
        teamTag:  { type: string }
        role:     { $ref: "#/components/schemas/TeamMemberRole" }
        joinedAt: { type: string, format: date-time }
        leftAt:   { type: string, format: date-time, nullable: true }
    MmrHistoryEntry:
      description: |
        Snapshot of player MMR. V0 returns at most one entry (the current row).
      type: object
      required: [source, fetchedAt]
      properties:
        mmr:         { type: integer, nullable: true }
        source:      { $ref: "#/components/schemas/MmrSource" }
        fetchedAt:   { type: string, format: date-time }
        confirmedAt: { type: string, format: date-time, nullable: true }
    TeamHistoryDto:
      type: object
      required: [tournaments]
      properties:
        tournaments: { type: array, items: { $ref: "#/components/schemas/TeamTournamentEntry" } }
    TeamTournamentEntry:
      type: object
      required: [tournamentId, tournamentSlug, tournamentName, status, wasWinner]
      properties:
        tournamentId:   { type: string, format: uuid }
        tournamentSlug: { type: string }
        tournamentName: { type: string }
        status:         { $ref: "#/components/schemas/TournamentStatus" }
        endsAt:         { type: string, format: date-time, nullable: true }
        seed:           { type: integer, nullable: true }
        wasWinner:      { type: boolean }

    # ---- Tournament ----
    TournamentDto:
      type: object
      required: [id, name, slug, format, status, hidden, defaultCoinToss, defaultAutoLaunch, broadcasterAccountIds]
      properties:
        id:                     { type: string, format: uuid }
        seasonId:               { type: string, format: uuid, nullable: true }
        winnerTeamId:           { type: string, format: uuid, nullable: true }
        name:                   { type: string }
        slug:                   { type: string }
        hidden:
          type: boolean
          description: Скрыта ли сущность с публичной части (видна только персоналу MODERATOR/ADMIN)
          example: false
        format:                 { $ref: "#/components/schemas/TournamentFormat" }
        description:            { type: string, nullable: true }
        prizePoolText:          { type: string, nullable: true }
        bannerUrl:              { type: string, nullable: true }
        maxTeams:               { type: integer, nullable: true }
        status:                 { $ref: "#/components/schemas/TournamentStatus" }
        registrationOpensAt:    { type: string, format: date-time, nullable: true }
        registrationClosesAt:   { type: string, format: date-time, nullable: true }
        startsAt:               { type: string, format: date-time, nullable: true }
        endsAt:                 { type: string, format: date-time, nullable: true }
        # Default match-lobby settings applied when a match has no override.
        defaultGameMode:   { $ref: "#/components/schemas/GameMode" }
        defaultRegion:     { $ref: "#/components/schemas/Region" }
        defaultCoinToss:   { type: boolean }
        defaultAutoLaunch: { type: boolean }
        dotaLeagueId:       { type: integer, nullable: true }
        matchFormatDefault: { $ref: "#/components/schemas/MatchFormat" }
        grandFinalFormat:   { $ref: "#/components/schemas/MatchFormat" }
        broadcasterAccountIds:
          type: array
          items: { type: integer, format: int64 }
          description: |
            Dota account IDs зрителей-кастеров, которым разрешён доступ к лобби
            (передаётся в dota2api как allowedBroadcasterAccountIds). Всегда массив;
            пустой = кастеров нет.
        # Регламент турнира (опционально). regulationsUpdatedAt проставляется автоматически.
        regulationsUrl:     { type: string, nullable: true }
        regulationsContent: { type: string, nullable: true }
        regulationsVersion: { type: string, nullable: true }
        regulationsUpdatedAt: { type: string, format: date-time, nullable: true }
    CreateTournamentRequest:
      type: object
      required: [name, slug, format]
      properties:
        name:                  { type: string }
        slug:                  { type: string }
        seasonId:              { type: string, format: uuid }
        format:                { $ref: "#/components/schemas/TournamentFormat" }
        description:           { type: string }
        rules:                 { type: string }
        prizePoolText:         { type: string }
        bannerAttachmentId:    { type: string, format: uuid }
        maxTeams:              { type: integer }
        registrationOpensAt:   { type: string, format: date-time }
        registrationClosesAt:  { type: string, format: date-time }
        startsAt:              { type: string, format: date-time }
        endsAt:                { type: string, format: date-time }
        defaultGameMode:       { $ref: "#/components/schemas/GameMode" }
        defaultRegion:         { $ref: "#/components/schemas/Region" }
        defaultCoinToss:       { type: boolean }
        defaultAutoLaunch:     { type: boolean }
        dotaLeagueId:          { type: integer }
        matchFormatDefault:    { $ref: "#/components/schemas/MatchFormat" }
        grandFinalFormat:      { $ref: "#/components/schemas/MatchFormat" }
        broadcasterAccountIds:
          type: array
          items: { type: integer, format: int64 }
          description: Опционально. Отсутствие или null = пустой список. Нормализуется на сервере.
    UpdateTournamentRequest:
      description: PATCH-семантика — поля со значением `null` или отсутствующие не меняются.
      type: object
      properties:
        name:                  { type: string }
        description:           { type: string }
        rules:                 { type: string }
        prizePoolText:         { type: string }
        bannerAttachmentId:    { type: string, format: uuid }
        maxTeams:              { type: integer }
        registrationOpensAt:   { type: string, format: date-time }
        registrationClosesAt:  { type: string, format: date-time }
        startsAt:              { type: string, format: date-time }
        endsAt:                { type: string, format: date-time }
        defaultGameMode:       { $ref: "#/components/schemas/GameMode" }
        defaultRegion:         { $ref: "#/components/schemas/Region" }
        defaultCoinToss:       { type: boolean }
        defaultAutoLaunch:     { type: boolean }
        dotaLeagueId:          { type: integer }
        matchFormatDefault:    { $ref: "#/components/schemas/MatchFormat" }
        grandFinalFormat:      { $ref: "#/components/schemas/MatchFormat" }
        broadcasterAccountIds:
          type: array
          items: { type: integer, format: int64 }
          description: |
            PATCH-семантика. null/отсутствие = не менять; [] = очистить;
            непустой массив = заменить (с нормализацией: дубли отбрасываются, ≤ 50).
        # Регламент. PATCH-семантика: null/отсутствие = не менять; пустая строка = очистить.
        # Любое изменение этих полей автоматически обновляет regulationsUpdatedAt.
        regulationsUrl:     { type: string }
        regulationsContent: { type: string }
        regulationsVersion: { type: string }
    TournamentDetailsDto:
      type: object
      required: [tournament, registeredTeamsCount, canRegister]
      properties:
        tournament:           { $ref: "#/components/schemas/TournamentDto" }
        registeredTeamsCount: { type: integer }
        canRegister:          { type: boolean }
        topTeams:             { type: array, items: { $ref: "#/components/schemas/TournamentTeamDto" } }
        rules:                { type: string, nullable: true }
    TournamentTeamDto:
      type: object
      required: [team, registeredAt, withdrawn]
      properties:
        team:         { $ref: "#/components/schemas/TeamPublicDto" }
        seed:         { type: integer, nullable: true }
        registeredAt: { type: string, format: date-time }
        withdrawn:    { type: boolean }
    BracketDto:
      type: object
      required: [format, rounds]
      properties:
        format: { $ref: "#/components/schemas/TournamentFormat" }
        rounds: { type: array, items: { $ref: "#/components/schemas/BracketRoundDto" } }
    BracketRoundDto:
      type: object
      required: [section, roundIndex, title, matches]
      properties:
        section:    { $ref: "#/components/schemas/BracketSection" }
        roundIndex: { type: integer }
        title:      { type: string }
        matches:    { type: array, items: { $ref: "#/components/schemas/BracketCellDto" } }

    # Source of a bracket cell slot: a winner/loser of another match, a seeded
    # team (R1 bye cell), or an empty BYE pass. `label` is render-ready text.
    SlotSourceType:
      type: string
      enum: [WINNER, LOSER, TEAM, BYE]
    SlotSourceDto:
      type: object
      required: [type, label]
      properties:
        type:       { $ref: "#/components/schemas/SlotSourceType" }
        section:    { $ref: "#/components/schemas/BracketSection" }
        round:      { type: integer, nullable: true }
        matchIndex: { type: integer, nullable: true }
        team:       { $ref: "#/components/schemas/TeamPublicDto" }
        label:      { type: string }

    # One bracket cell. `match` is the real materialized match (or absent for a
    # placeholder); slotA/slotB always carry the slot provenance for empty slots.
    BracketCellDto:
      type: object
      required: [section, roundIndex, matchIndex, placeholder, slotA, slotB]
      properties:
        section:     { $ref: "#/components/schemas/BracketSection" }
        roundIndex:  { type: integer }
        matchIndex:  { type: integer }
        placeholder: { type: boolean }
        match:       { $ref: "#/components/schemas/MatchDto" }
        slotA:       { $ref: "#/components/schemas/SlotSourceDto" }
        slotB:       { $ref: "#/components/schemas/SlotSourceDto" }

    # ---- Match ----
    MatchDto:
      type: object
      required: [id, kind, teamA, teamB, format, status, scoreA, scoreB,
                 gameMode, region, coinToss, autoLaunch]
      properties:
        id:           { type: string, format: uuid }
        tournamentId: { type: string, format: uuid, nullable: true }
        # Slug of the parent tournament, populated when tournamentId resolves.
        # Lets the UI render a clickable «Турнир» badge without an extra request.
        tournamentSlug: { type: string, nullable: true }
        kind:         { $ref: "#/components/schemas/MatchKind" }
        teamA:        { $ref: "#/components/schemas/TeamPublicDto" }
        teamB:        { $ref: "#/components/schemas/TeamPublicDto" }
        format:       { $ref: "#/components/schemas/MatchFormat" }
        scheduledAt:  { type: string, format: date-time, nullable: true }
        status:       { $ref: "#/components/schemas/MatchStatus" }
        scoreA:       { type: integer }
        scoreB:       { type: integer }
        winnerTeamId: { type: string, format: uuid, nullable: true }
        # How the result was produced (normal / technical / cancelled).
        resultType:   { $ref: "#/components/schemas/MatchResultType" }
        notes:        { type: string, nullable: true }
        finishedAt:   { type: string, format: date-time, nullable: true }
        # Captain readiness (null until that side's captain marks ready).
        teamAReadyAt:    { type: string, format: date-time, nullable: true }
        teamBReadyAt:    { type: string, format: date-time, nullable: true }
        # Dota lobby — populated once both captains are ready and creation succeeds.
        lobbyId:         { type: string, nullable: true }
        lobbyCreatedAt:  { type: string, format: date-time, nullable: true }
        # Async lobby-creation retry state.
        #   lobbyCreateStartedAt — set when both captains are ready (scheduler
        #     is now attempting to create the Dota lobby).
        #   lobbyCreateFailedAt + lobbyCreateFailedReason — terminal failure
        #     after the 5-minute attempt window expires. Both readiness flags
        #     are cleared at that point; captains can re-mark to retry.
        #   lobbyCreateAttempts — monotonically increasing per attempt cycle.
        # Polling pattern: while lobbyCreateStartedAt != null AND lobbyId ==
        # null AND lobbyCreateFailedAt == null, poll GET /matches/{id} every
        # ~5s.
        lobbyCreateStartedAt:    { type: string, format: date-time, nullable: true }
        lobbyCreateFailedAt:     { type: string, format: date-time, nullable: true }
        lobbyCreateFailedReason: { type: string, nullable: true }
        lobbyCreateAttempts:     { type: integer, default: 0 }
        # Effective lobby settings (override > tournament default > fallback). Never null.
        gameMode:   { $ref: "#/components/schemas/GameMode" }
        region:     { $ref: "#/components/schemas/Region" }
        coinToss:   { type: boolean }
        autoLaunch: { type: boolean }
        # Bracket position. Null for non-tournament matches (matchmaking, etc).
        bracketSection: { $ref: "#/components/schemas/BracketSection", nullable: true }
        roundIndex:     { type: integer, nullable: true }
        matchIndex:     { type: integer, nullable: true }
    MatchLiveSnapshotDto:
      type: object
      required: [gameTime, startTimestamp, gameState, radiant, dire, fetchedAt]
      properties:
        gameTime:       { type: integer, description: "Seconds since game clock started (may be negative during pick phase)" }
        startTimestamp: { type: integer, format: int64, description: "Unix timestamp of game start" }
        gameState:      { type: integer, description: "Dota internal game state enum (e.g. 5 = playing)" }
        radiant:        { $ref: "#/components/schemas/TeamLiveDto" }
        dire:           { $ref: "#/components/schemas/TeamLiveDto" }
        radiantTeamId:  { type: string, format: uuid, nullable: true, description: "Id of the platform team (teamA or teamB) currently on Radiant; resolved from the live roster so it stays correct through a coin-toss side flip. Null when the side cannot be attributed." }
        direTeamId:     { type: string, format: uuid, nullable: true, description: "Id of the platform team (teamA or teamB) currently on Dire; resolved from the live roster so it stays correct through a coin-toss side flip. Null when the side cannot be attributed." }
        fetchedAt:      { type: string, format: date-time, description: "When the backend last polled Dota2API for this snapshot" }
    TeamLiveDto:
      type: object
      required: [score, netWorth, players]
      properties:
        score:    { type: integer }
        netWorth: { type: integer }
        players:  { type: array, items: { $ref: "#/components/schemas/PlayerLiveDto" } }
    PlayerLiveDto:
      type: object
      required: [steamAccountId, name, heroId, level, kills, deaths, assists, lastHits, denies, gold, netWorth, items, abilities]
      properties:
        steamAccountId: { type: integer, format: int64 }
        playerId:       { type: string, format: uuid, nullable: true }
        name:           { type: string }
        heroId:         { type: integer }
        level:          { type: integer }
        kills:          { type: integer }
        deaths:         { type: integer }
        assists:        { type: integer }
        lastHits:       { type: integer }
        denies:         { type: integer }
        gold:           { type: integer }
        netWorth:       { type: integer }
        items:          { type: array, items: { type: integer } }
        abilities:      { type: array, items: { type: integer } }
    MatchResultDto:
      type: object
      required: [dotaMatchId, durationSec, radiantScore, direScore, resultFetchedAt, radiant, dire]
      properties:
        dotaMatchId:     { type: integer, format: int64 }
        durationSec:     { type: integer }
        radiantScore:    { type: integer }
        direScore:       { type: integer }
        winnerTeamId:    { type: string, format: uuid, nullable: true }
        resultFetchedAt: { type: string, format: date-time }
        radiant:         { type: array, items: { $ref: "#/components/schemas/MatchPlayerStatDto" } }
        dire:            { type: array, items: { $ref: "#/components/schemas/MatchPlayerStatDto" } }
        # Derived at read time (no DB column): steam account id of the MVP on the
        # winning side. Null when no stats are available.
        mvpSteamAccountId: { type: integer, format: int64, nullable: true }
    MatchPlayerStatDto:
      type: object
      required: [steamAccountId, heroId, kills, deaths, assists, lastHits, denies, gpm, xpm, level, heroDamage, towerDamage, heroHealing, netWorth, gold, leaverStatus, items, isWin]
      properties:
        steamAccountId: { type: integer, format: int64 }
        playerId:       { type: string, format: uuid, nullable: true }
        playerName:     { type: string, nullable: true }
        heroId:         { type: integer }
        kills:          { type: integer }
        deaths:         { type: integer }
        assists:        { type: integer }
        lastHits:       { type: integer }
        denies:         { type: integer }
        gpm:            { type: integer }
        xpm:            { type: integer }
        level:          { type: integer }
        heroDamage:     { type: integer }
        towerDamage:    { type: integer }
        heroHealing:    { type: integer }
        netWorth:       { type: integer }
        gold:           { type: integer }
        leaverStatus:   { type: integer }
        items:          { type: array, items: { type: integer } }
        abilities:      { type: array, items: { type: integer }, nullable: true }
        isWin:          { type: boolean }
    PlayerMatchSummaryDto:
      type: object
      required: [matchId, dotaMatchId, win, heroId, kills, deaths, assists, gpm, xpm, netWorth, durationSec, radiant, playedAt]
      properties:
        matchId:        { type: string, format: uuid }
        dotaMatchId:    { type: integer, format: int64 }
        win:            { type: boolean }
        heroId:         { type: integer }
        kills:          { type: integer }
        deaths:         { type: integer }
        assists:        { type: integer }
        gpm:            { type: integer }
        xpm:            { type: integer }
        netWorth:       { type: integer }
        durationSec:    { type: integer }
        radiant:        { type: boolean }
        kind:           { $ref: "#/components/schemas/MatchKind", nullable: true }
        tournamentId:   { type: string, format: uuid, nullable: true }
        tournamentSlug: { type: string, nullable: true }
        tournamentName: { type: string, nullable: true }
        playedAt:       { type: string, format: date-time }
    PlayerStatsDto:
      type: object
      required: [games, wins, losses, winrate, avgKills, avgDeaths, avgAssists, avgKda, tournamentsPlayed, currentStreak, bestWinStreak, favoriteHeroes]
      properties:
        games:             { type: integer }
        wins:              { type: integer }
        losses:            { type: integer }
        winrate:           { type: number, format: double, description: "0..1 fraction" }
        avgKills:          { type: number, format: double }
        avgDeaths:         { type: number, format: double }
        avgAssists:        { type: number, format: double }
        avgKda:            { type: number, format: double }
        tournamentsPlayed: { type: integer }
        currentStreak:     { type: integer, description: "signed: + win streak, - loss streak" }
        bestWinStreak:     { type: integer }
        favoriteHeroes:
          type: array
          items: { $ref: "#/components/schemas/FavoriteHeroDto" }
    FavoriteHeroDto:
      type: object
      required: [heroId, games, wins, winrate]
      properties:
        heroId:  { type: integer }
        games:   { type: integer }
        wins:    { type: integer }
        winrate: { type: number, format: double }
    UpdateMatchRequest:
      description: |
        Admin PATCH payload for a match. All fields nullable — only non-null
        fields are applied. `gameMode`/`region`/`coinToss`/`autoLaunch` set per-match
        overrides; `teamAReady`/`teamBReady` are admin-only readiness toggles
        (they do not auto-trigger lobby creation — use `/lobby/recreate`).
      type: object
      properties:
        scheduledAt:  { type: string, format: date-time }
        scoreA:       { type: integer }
        scoreB:       { type: integer }
        winnerTeamId: { type: string, format: uuid }
        status:       { $ref: "#/components/schemas/MatchStatus" }
        notes:        { type: string }
        gameMode:     { $ref: "#/components/schemas/GameMode" }
        region:       { $ref: "#/components/schemas/Region" }
        coinToss:     { type: boolean }
        autoLaunch:   { type: boolean }
        teamAReady:   { type: boolean }
        teamBReady:   { type: boolean }
    TechResultRequest:
      type: object
      required: [winnerTeamId, resultType]
      properties:
        winnerTeamId: { type: string, format: uuid }
        # Must be TECH_WIN or TECH_LOSS; the match finishes with winnerTeamId either way.
        resultType:   { $ref: "#/components/schemas/MatchResultType" }
    MoveTeamsRequest:
      description: |
        Reassign one or both team slots of a not-yet-finished bracket match.
        Omit a field to leave that slot unchanged.
      type: object
      properties:
        teamAId: { type: string, format: uuid, nullable: true }
        teamBId: { type: string, format: uuid, nullable: true }
    ChangeFormatRequest:
      type: object
      required: [format]
      properties:
        format: { $ref: "#/components/schemas/MatchFormat" }
    CreateMatchRequestDto:
      type: object
      required: [kind, format, startsAt]
      properties:
        kind:        { $ref: "#/components/schemas/MatchKind" }
        format:      { $ref: "#/components/schemas/MatchFormat" }
        region:      { type: string }
        avgMmrMin:   { type: integer }
        avgMmrMax:   { type: integer }
        startsAt:    { type: string, format: date-time }
        description: { type: string }
    MatchRequestDto:
      type: object
      required: [id, creatorTeam, kind, format, startsAt, status, createdAt]
      properties:
        id:          { type: string, format: uuid }
        creatorTeam: { $ref: "#/components/schemas/TeamPublicDto" }
        kind:        { $ref: "#/components/schemas/MatchKind" }
        format:      { $ref: "#/components/schemas/MatchFormat" }
        region:      { type: string, nullable: true }
        avgMmrMin:   { type: integer, nullable: true }
        avgMmrMax:   { type: integer, nullable: true }
        startsAt:    { type: string, format: date-time }
        description: { type: string, nullable: true }
        status:      { $ref: "#/components/schemas/MatchRequestStatus" }
        createdAt:   { type: string, format: date-time }

    # ---- Open Lobby ----
    OpenLobbySlotDto:
      type: object
      required: [slotIndex]
      properties:
        slotIndex:        { type: integer, format: int32, minimum: 0, maximum: 9 }
        playerId:         { type: string, format: uuid, nullable: true }
        playerNickname:   { type: string, nullable: true }
        playerAvatarUrl:  { type: string, nullable: true }
        playerFemaleVerified: { type: boolean, description: "Official 'verified female' status of the slot's player." }
        joinedAt:         { type: string, format: date-time, nullable: true }
    OpenLobbyDto:
      type: object
      required:
        - id
        - creatorPlayerId
        - mode
        - format
        - startsAt
        - status
        - slotsFilled
        - slotsTotal
        - slots
      properties:
        id:                    { type: string, format: uuid }
        creatorPlayerId:       { type: string, format: uuid }
        creatorNickname:       { type: string, nullable: true }
        creatorAvatarUrl:      { type: string, nullable: true }
        mode:                  { $ref: "#/components/schemas/OpenLobbyMode" }
        format:                { $ref: "#/components/schemas/MatchFormat" }
        region:                { type: string, nullable: true }
        avgMmrMin:             { type: integer, format: int32, nullable: true }
        avgMmrMax:             { type: integer, format: int32, nullable: true }
        startsAt:              { type: string, format: date-time }
        description:           { type: string, nullable: true }
        status:                { $ref: "#/components/schemas/OpenLobbyStatus" }
        readyAt:               { type: string, format: date-time, nullable: true }
        confirmationExpiresAt: { type: string, format: date-time, nullable: true }
        dotaLobbyId:           { type: string, nullable: true }
        launchedAt:            { type: string, format: date-time, nullable: true }
        createdAt:             { type: string, format: date-time }
        closedAt:              { type: string, format: date-time, nullable: true }
        slotsFilled:           { type: integer, format: int32 }
        slotsTotal:            { type: integer, format: int32 }
        slots:
          type: array
          items: { $ref: "#/components/schemas/OpenLobbySlotDto" }
    CreateOpenLobbyRequest:
      type: object
      required: [mode, format, startsAt]
      properties:
        mode:              { $ref: "#/components/schemas/OpenLobbyMode" }
        format:            { $ref: "#/components/schemas/MatchFormat" }
        region:            { type: string, nullable: true }
        avgMmrMin:         { type: integer, format: int32, nullable: true }
        avgMmrMax:         { type: integer, format: int32, nullable: true }
        startsAt:          { type: string, format: date-time }
        description:       { type: string, nullable: true }
        creatorSlotIndex:  { type: integer, format: int32, nullable: true, minimum: 0, maximum: 9 }

    # --- Admin: match ---
    CreateMatchRequest:
      type: object
      required: [kind, teamAId, teamBId, format]
      properties:
        tournamentId: { type: string, format: uuid, nullable: true }
        kind:         { $ref: "#/components/schemas/MatchKind" }
        teamAId:      { type: string, format: uuid }
        teamBId:      { type: string, format: uuid }
        format:       { $ref: "#/components/schemas/MatchFormat" }
        scheduledAt:  { type: string, format: date-time, nullable: true }
    FinishMatchRequest:
      type: object
      required: [winnerTeamId, scoreA, scoreB]
      properties:
        winnerTeamId: { type: string, format: uuid }
        scoreA:       { type: integer, format: int32 }
        scoreB:       { type: integer, format: int32 }

    # --- Admin: ratings ---
    RatingRecalcResult:
      type: object
      properties:
        appliedMatches: { type: integer, format: int64 }

    # --- Admin: seasons ---
    CreateSeasonRequest:
      type: object
      required: [name, slug, startsAt, endsAt]
      properties:
        name:               { type: string, maxLength: 64 }
        slug:               { type: string, maxLength: 64 }
        description:        { type: string, nullable: true }
        startsAt:           { type: string, format: date-time }
        endsAt:             { type: string, format: date-time }
        bannerAttachmentId: { type: string, format: uuid, nullable: true }
    UpdateSeasonRequest:
      type: object
      properties:
        name:               { type: string, nullable: true }
        description:        { type: string, nullable: true }
        startsAt:           { type: string, format: date-time, nullable: true }
        endsAt:             { type: string, format: date-time, nullable: true }
        bannerAttachmentId: { type: string, format: uuid, nullable: true }

    # --- Tournament eligibility / admin teams ---
    TournamentEligibilityDto:
      type: object
      description: Все поля nullable — null означает «без ограничения».
      properties:
        expectedTeamSize: { type: integer, format: int32, nullable: true }
        minMaleCount:     { type: integer, format: int32, nullable: true }
        minFemaleCount:   { type: integer, format: int32, nullable: true }
        maxPlayerMmr:     { type: integer, format: int32, nullable: true }
        maxTeamAvgMmr:    { type: integer, format: int32, nullable: true }
        updatedAt:        { type: string, format: date-time, nullable: true }
    EligibilityViolationDto:
      type: object
      properties:
        code:    { type: string }
        message: { type: string }
        meta:    { type: object, additionalProperties: true }
    RosterMemberAdminDto:
      type: object
      properties:
        playerId:       { type: string, format: uuid }
        nickname:       { type: string }
        gender:         { $ref: "#/components/schemas/GenderType" }
        femaleVerified: { type: boolean }
        mmr:            { type: integer, format: int32, nullable: true }
        role:           { $ref: "#/components/schemas/TeamMemberRole" }
    TournamentTeamAdminDto:
      type: object
      properties:
        teamId:               { type: string, format: uuid }
        name:                 { type: string }
        status:               { $ref: "#/components/schemas/RequestStatus" }
        rejectReason:         { type: string, nullable: true }
        registeredAt:         { type: string, format: date-time }
        eligibilityViolations:
          type: array
          items: { $ref: "#/components/schemas/EligibilityViolationDto" }
        eligibilityCheckedAt: { type: string, format: date-time, nullable: true }
        roster:
          type: array
          items: { $ref: "#/components/schemas/RosterMemberAdminDto" }
    RejectTeamRequest:
      type: object
      properties:
        reason: { type: string, nullable: true }

    # --- Admin: audit ---
    AuditLogDto:
      type: object
      properties:
        id:         { type: string, format: uuid }
        actor:
          allOf: [{ $ref: "#/components/schemas/PlayerPublicDto" }]
          nullable: true
        action:     { type: string }
        targetType: { type: string }
        targetId:   { type: string, format: uuid }
        payload:    { type: object, additionalProperties: true }
        at:         { type: string, format: date-time }

    # --- Admin: bots ---
    BotStatusDto:
      type: object
      properties:
        username:        { type: string }
        accountId:       { type: integer, format: int64 }
        steamState:      { type: string }
        gcState:         { type: string }
        inLobby:         { type: boolean }
        currentLobbyId:  { type: integer, format: int64, nullable: true }
        healthy:         { type: boolean }

    # --- Notification ---
    NotificationType:
      type: string
      enum: [MATCH_READY_CHECK, MATCH_LIVE]
    NotificationDto:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/NotificationType" }
        title: { type: string }
        body: { type: string }
        link: { type: string, nullable: true }
        matchId: { type: string, format: uuid, nullable: true }
        read: { type: boolean }
        createdAt: { type: string, format: date-time }
