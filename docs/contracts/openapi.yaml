  # =================== MATCH ===================
  /api/v1/matches/{id}:
    get:
      tags: [Match]
      security: []
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchDto" }

  /api/v1/matches/{id}/ready:
    post:
      tags: [Match]
      summary: Captain marks their team ready.
      description: |
        Match must be SCHEDULED and have no lobby yet. Caller must be the captain
        of `teamA` or `teamB`. Idempotent — re-marking ready is a no-op. When both
        sides are ready, a Dota lobby is created automatically (status → LIVE).
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchDto" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/matches/{id}/unready:
    post:
      tags: [Match]
      summary: Captain clears their team's ready flag.
      description: |
        Captain-only. Clears the readiness timestamp on the caller's side. Idempotent.
        Errors with `PLATFORM_CONFLICT` if the lobby has already been created.
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchDto" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/matches/{id}/live:
    get:
      tags: [Match]
      summary: Realtime snapshot of a LIVE match (Dota2API realtime mirror).
      description: |
        Returns the most recent fresh snapshot from Dota2API's `/api/lobby/{id}/realtime`.
        Backend polls upstream every ~15s and caches in memory with a 60-second freshness
        TTL. Frontend should poll this endpoint while `match.status === 'LIVE'`
        (e.g. every 15s) and stop when status flips to FINISHED.
        Returns 204 when no fresh snapshot exists (lobby not loaded, dota2api down,
        or match not LIVE).
      security: []
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchLiveSnapshotDto" }
        "204": { description: no fresh snapshot }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/matches/{id}/result:
    get:
      tags: [Match]
      summary: Final per-player statistics for a FINISHED match.
      description: |
        Available once the result poll scheduler has saved per-player stats from
        Steam. Returns 404 for matches that are not FINISHED or were finished
        manually by an admin without Steam data (rare).
      security: []
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: result with split radiant/dire rosters
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchResultDto" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/admin/matches/{id}/lobby/recreate:
    post:
      tags: [Admin, Match]
      summary: Force-create (or recreate) the Dota lobby for a match.
      description: |
        ADMIN-only. Bypasses the "both captains ready" gate. Useful when automatic
        creation failed, or settings/rosters changed. Returns `502 PLATFORM_LOBBY_CREATE_FAILED`
        if the external dota2api rejected the request.
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Lobby creation failed upstream
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }

  /api/v1/admin/matches/{id}/lobby/launch:
    post:
      tags: [Admin, Match]
      summary: Force-start the already-created Dota lobby for a match.
      description: |
        ADMIN-only. Admin override of the normal `autoLaunch` flow — sends
        `POST /api/lobby/{lobbyId}/launch` to dota2api. Use when the lobby was
        created with `autoLaunch=false` (or auto-launch did not fire for any
        reason) and the admin wants to force-start the match.

        Dota may still reject the launch if the lobby state does not permit
        starting (e.g. the selected game mode requires 5v5 but the rosters are
        short, or not all listed steam ids have joined the Steam lobby). The
        upstream reason is surfaced as `502 PLATFORM_LOBBY_LAUNCH_REJECTED`
        with the raw Dota message in `detail`.

        Returns `400 PLATFORM_VALIDATION_FAILED` if the match has no `lobbyId`
        yet (nothing to launch).
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchDto" }
        "400":
          description: Match has no lobby yet
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Lobby launch rejected or failed upstream
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ErrorDto" }

  # ----- Manual bracket management (MODERATOR/ADMIN) -----
  /api/v1/admin/matches/{id}/tech-result:
    post:
      tags: [Admin, Match]
      summary: Award a technical win/loss.
      description: |
        MODERATOR/ADMIN. Finishes the match with the given winner and tags the
        result as TECH_WIN/TECH_LOSS. Propagates the bracket like a normal finish.
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TechResultRequest" }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchDto" }
        "400": { $ref: "#/components/responses/Validation" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/admin/matches/{id}/cancel-result:
    post:
      tags: [Admin, Match]
      summary: Void a finished match result.
      description: |
        MODERATOR/ADMIN. Reverts FINISHED → SCHEDULED, clears winner/score, and
        undoes bracket propagation so downstream shells are corrected. Returns
        409 if a downstream match has already progressed past SCHEDULED.
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchDto" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/admin/matches/{id}/move-teams:
    post:
      tags: [Admin, Match]
      summary: Reassign / swap the team slots of a match.
      description: |
        MODERATOR/ADMIN. Sets teamA and/or teamB on a not-yet-finished match and
        clears captain readiness so captains must reconfirm.

        Rejected with 409 PLATFORM_CONFLICT if the match is FINISHED, or if its
        result has already been propagated into a downstream bracket slot
        (WB/LB/GF) — reassigning would orphan that slot. Cancel the result first
        (POST /cancel-result) in that case. Because the move is only permitted
        while no downstream slot has been fed, no re-propagation is required.
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MoveTeamsRequest" }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchDto" }
        "400": { $ref: "#/components/responses/Validation" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/admin/matches/{id}/format:
    post:
      tags: [Admin, Match]
      summary: Change a match's series format (BO1/BO3/BO5).
      description: MODERATOR/ADMIN. Rejects FINISHED matches.
      parameters: [{ $ref: "#/components/parameters/IdInPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangeFormatRequest" }
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchDto" }
        "400": { $ref: "#/components/responses/Validation" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/match-requests:
    get:
      tags: [Match]
      summary: Открытые лобби
      security: []
      parameters:
        - in: query
          name: kind
          schema: { $ref: "#/components/schemas/MatchKind" }
        - in: query
          name: format
          schema: { $ref: "#/components/schemas/MatchFormat" }
        - in: query
          name: region
          schema: { type: string }
        - in: query
          name: mmrMin
          schema: { type: integer }
        - in: query
          name: mmrMax
          schema: { type: integer }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: ок
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/MatchRequestDto" }
    post:
      tags: [Match]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMatchRequestDto" }
      responses:
        "201":
          description: ок
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MatchRequestDto" }

  /api/v1/match-requests/{id}/accept:
